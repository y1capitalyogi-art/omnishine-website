<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Omni Shine">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.55" stop-color="#172554"/>
      <stop offset="1" stop-color="#0c1340"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="0.5" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fde68a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square background with subtle gradient -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Soft top-left highlight for depth -->
  <path d="M14 14 Q14 8 20 8 L44 8" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Glow halo behind main sparkle -->
  <circle cx="32" cy="32" r="16" fill="url(#glow)"/>

  <!-- Main 4-point sparkle (the "shine") -->
  <path d="M32 13 L34.4 29.6 L51 32 L34.4 34.4 L32 51 L29.6 34.4 L13 32 L29.6 29.6 Z"
        fill="url(#sparkle)"
        stroke="#92400e"
        stroke-width="0.4"
        stroke-linejoin="round"
        stroke-opacity="0.6"/>

  <!-- Constellation accent — small sparkle, top-right -->
  <path d="M49 18 L49.8 21 L52.8 21.8 L49.8 22.6 L49 25.6 L48.2 22.6 L45.2 21.8 L48.2 21 Z"
        fill="#fde68a"
        opacity="0.92"/>

  <!-- Constellation accent — tiny sparkle, bottom-left -->
  <path d="M16 47 L16.6 49 L18.6 49.6 L16.6 50.2 L16 52.2 L15.4 50.2 L13.4 49.6 L15.4 49 Z"
        fill="#fde68a"
        opacity="0.75"/>

  <!-- Tiny dot accent -->
  <circle cx="50" cy="44" r="1.2" fill="#fde68a" opacity="0.7"/>
</svg>
